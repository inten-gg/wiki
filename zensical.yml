site_name: INTen Wiki
site_description: Tutorials and references for Games we play
repo_url: https://github.com/inten-gg/wiki

nav:
  - Home: index.md
  - Squad: 
    - Settings: squad/settings/index.md
    #- Seeding Tool: squad/seeding-tool/index.md
  - ArmA 3:
    - TFAR: arma3/tfar/index.md
    - Advanced Medical: arma3/advanced-medical/index.md
  - ArmA Reforger:
      - Home: arma-reforger/index.md
  - League of Legends:
      - Home: league-of-legends/index.md^

theme:
  name: material
  custom_dir: theme
  favicon: 'https://inten.gg/img/int-emblem.png'
  logo: 'https://inten.gg/img/int-emblem.png'
  font:
    text: 'Inter'
    code: 'Roboto Mono'
  palette:
    - scheme: default
      primary: 'green'
      accent: 'emerald'
  language: de
  features:
    - announce.dismiss

extra_css:
  - 'assets/css/theme-vars.css'
  - 'assets/stylesheets/custom.css'

plugins:
  - macros

markdown_extensions:
  - toc:
      permalink: '¶'
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
